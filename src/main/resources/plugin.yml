name: levelSystem
description: $description
version: '${version}'

main: com.drewdrew1.Main
api-version: '26.1.2'
load: POSTWORLD
depend: [DBManager]

commands:
  levelSystem:
    description: levelSystem admin command
    usage: /levelSystem reload
    aliases: [levelsystem]
    permission: levelsystem.reload

permissions:
  levelsystem.reload:
    description: Allows reloading levelSystem JSON cache
    default: op

authors: [ drewdrew1 ]
website: https://github.com/drewdrew0414/DRPG-Plugins
